name : Python Testing
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Download Repository
        uses: actions/checkout@v4
      - name: Install Pythongit 
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest